# SESSION — Frontend / Session Exposure (extension; relates 164.312(a)(2)(iv)).
# PHI persisted to browser storage or handed to third-party client SDKs.
rules:
  - id: session-phi-in-web-storage
    languages: [typescript, javascript]
    severity: ERROR
    message: >-
      PHI written to localStorage/sessionStorage survives logout and is readable by
      any script on the origin. Keep PHI server-side; hold transient state in memory.
    metadata:
      clearmap_category: SESSION
      clearmap_severity: high
      clearmap_title: PHI persisted to web storage
      hipaa_ref: 164.312(a)(2)(iv)
      remediation: Do not persist PHI in localStorage/sessionStorage; use in-memory state cleared on logout.
    patterns:
      - pattern-either:
          # A PHI-looking storage key.
          - patterns:
              - pattern-either:
                  - pattern: localStorage.setItem($K, $VAL)
                  - pattern: sessionStorage.setItem($K, $VAL)
              - metavariable-regex:
                  metavariable: $K
                  regex: (?i).*(patient|mrn|diagnosis|phi|chart|dob|ssn)
          # Or a BENIGN key whose value serializes a PHI-named object
          # (localStorage.setItem("state", JSON.stringify(patientChart))). The
          # JSON.stringify wrapper keeps this precise: a bare opaque token stored
          # under a benign key (e.g. a CSRF token named patientToken) does NOT match.
          - patterns:
              - pattern-either:
                  - pattern: localStorage.setItem($K, JSON.stringify($V))
                  - pattern: sessionStorage.setItem($K, JSON.stringify($V))
              - metavariable-regex:
                  metavariable: $V
                  regex: (?i).*(patient|mrn|diagnos|phi|chart|dob|ssn|medication|allerg|symptom)

  - id: session-phi-in-cookie
    languages: [typescript, javascript]
    severity: WARNING
    message: >-
      PHI written into a JS-readable cookie is exposed to scripts and sent on every
      request. Avoid storing PHI client-side; use HttpOnly+Secure non-PHI cookies.
    metadata:
      clearmap_category: SESSION
      clearmap_severity: medium
      clearmap_title: PHI written to a JS-readable cookie
      hipaa_ref: 164.312(a)(2)(iv)
      remediation: Do not store PHI in cookies; use server-set HttpOnly+Secure cookies without PHI.
    patterns:
      - pattern-regex: '(?i)document\.cookie\s*=\s*`[^`]*(mrn|patient|diagnosis|dob|ssn)'

  - id: session-patient-to-thirdparty-sdk
    languages: [typescript, javascript]
    severity: ERROR
    message: >-
      Patient data passed to a third-party SDK (e.g. analytics.identify) ships PHI to
      a vendor with no clinical purpose / no BAA. Identify by opaque non-PHI id only.
    metadata:
      clearmap_category: SESSION
      clearmap_severity: critical
      clearmap_title: Patient state passed to a third-party SDK
      hipaa_ref: 164.312(a)(2)(iv)
      remediation: Never pass PHI to client SDKs; use an opaque id and non-PHI traits only.
    patterns:
      - pattern: $SDK.identify($ID, $OBJ)
      - metavariable-pattern:
          metavariable: $OBJ
          patterns:
            - pattern-regex: (?i)\b(name|mrn|diagnosis|dob|ssn)\b

  - id: session-patient-identify-family
    languages: [typescript, javascript]
    severity: ERROR
    message: >-
      PHI passed to a third-party user-identification method (setUser /
      setUserProperties, or a single-object identify) ships patient identifiers to
      a vendor. Identify users by an opaque, non-PHI id and never attach clinical
      or identifying traits.
    metadata:
      clearmap_category: SESSION
      clearmap_severity: high
      clearmap_title: PHI passed to a third-party user-identification method
      hipaa_ref: 164.312(a)(2)(iv)
      remediation: Use an opaque non-PHI id; never pass name/MRN/DOB/SSN/diagnosis to a client SDK.
    patterns:
      - pattern-either:
          - pattern: $SDK.setUser($OBJ)
          - pattern: $SDK.setUserProperties($OBJ)
          - pattern: $SDK.identify($OBJ)
      - metavariable-pattern:
          metavariable: $OBJ
          patterns:
            - pattern-regex: (?i)\b(name|mrn|diagnosis|dob|ssn)\b
