# ACCESS / AUTH / INTEGRITY — deterministic Category A rules.
#
# Precision-first: every rule here keys on STRUCTURE (a PHI-named route with no
# auth dependency in the same decorator/function shape), never on semantic
# judgment. What regex cannot judge stays reasoning-led by design:
#   - ACCESS-02 (role check on an already-authenticated action) — whether a
#     given role SHOULD be allowed is an authorization-policy question.
#   - Express apps with app.use(auth) global middleware — see the caveat in the
#     express rule message (capped at HIGH for exactly that reason).
#
# PHI route lexicon shared by the route rules (clinical-record + clinical-workflow
# + app-domain nouns; matched against the route PATH only, so broadening it stays
# precise). "case" is word-boundary-anchored so it never matches showcase/usecase.
#   patient|record|chart|mrn|note|lab|medication|diagnos|encounter|observation|allerg
#   |conversation|message|scribe|intake|survey|assessment|member|eligibility
#   |prescription|vital|symptom|condition|appointment|referral|immuniz|imaging
#   |claim|insurance|case

rules:
  - id: access-fastapi-unauthenticated-phi-read
    languages: [python]
    severity: ERROR
    message: >-
      A PHI read route has no authentication dependency (no Depends(...) parameter
      and no dependencies=[...]), so any unauthenticated caller can read charts.
      164.312(d) requires verifying the identity of anyone accessing ePHI.
    metadata:
      clearmap_category: AUTH
      clearmap_severity: critical
      clearmap_title: Unguarded PHI read endpoint (no authentication)
      hipaa_ref: 164.312(d)
      remediation: Require an authenticated principal (e.g. Depends(current_user)) on every PHI route.
    patterns:
      - pattern: |
          @$R.get($PATH)
          def $FN(...):
              ...
      # Only an AUTH dependency counts as a guard. A route whose only Depends is a
      # non-auth provider (get_db, get_session, get_settings, pagination, ...) is
      # still unauthenticated, so the Depends callable must match the auth lexicon
      # for the route to be suppressed.
      - pattern-not:
          patterns:
            - pattern: |
                @$R.get($PATH)
                def $FN(..., $U=Depends($DEP), ...):
                    ...
            - metavariable-regex:
                metavariable: $DEP
                regex: (?i).*(auth|current_user|user|token|principal|login|require|verify|jwt|identity|permission|authoriz|authenticat|credential|api_?key|bearer|oauth|role|scope|whoami|viewer|actor|caller)
      - pattern-not: |
          @$R.get($PATH, dependencies=$DEPS)
          def $FN(...):
              ...
      - metavariable-pattern:
          metavariable: $PATH
          patterns:
            - pattern-regex: (?i)(patient|record|chart|mrn|note|lab|medication|diagnos|encounter|observation|allerg|conversation|message|scribe|intake|survey|assessment|member|eligibility|prescription|vital|symptom|condition|appointment|referral|immuniz|imaging|claim|insurance|\bcase)

  - id: access-fastapi-unauthenticated-phi-mutation
    languages: [python]
    severity: ERROR
    message: >-
      A PHI mutating route (POST/PUT/PATCH/DELETE) has no authentication dependency,
      so any caller can alter or destroy clinical data. Implicates integrity
      (164.312(c)(1)) as well as authentication (164.312(d)).
    metadata:
      clearmap_category: INTEGRITY
      clearmap_severity: critical
      clearmap_title: Unauthenticated mutation of PHI
      hipaa_ref: 164.312(c)(1)
      remediation: Require authentication + authorization on every mutating PHI endpoint.
    patterns:
      - pattern: |
          @$R.$METHOD($PATH)
          def $FN(...):
              ...
      - metavariable-regex:
          metavariable: $METHOD
          regex: ^(post|put|patch|delete)$
      # Only an AUTH dependency counts as a guard (see the read rule): a non-auth
      # provider such as Depends(get_db) does not authenticate the mutation.
      - pattern-not:
          patterns:
            - pattern: |
                @$R.$METHOD($PATH)
                def $FN(..., $U=Depends($DEP), ...):
                    ...
            - metavariable-regex:
                metavariable: $DEP
                regex: (?i).*(auth|current_user|user|token|principal|login|require|verify|jwt|identity|permission|authoriz|authenticat|credential|api_?key|bearer|oauth|role|scope|whoami|viewer|actor|caller)
      - pattern-not: |
          @$R.$METHOD($PATH, dependencies=$DEPS)
          def $FN(...):
              ...
      - metavariable-pattern:
          metavariable: $PATH
          patterns:
            - pattern-regex: (?i)(patient|record|chart|mrn|note|lab|medication|diagnos|encounter|observation|allerg|conversation|message|scribe|intake|survey|assessment|member|eligibility|prescription|vital|symptom|condition|appointment|referral|immuniz|imaging|claim|insurance|\bcase)

  - id: access-flask-unauthenticated-phi-route
    languages: [python]
    severity: ERROR
    message: >-
      A Flask PHI route has only the @route decorator — no auth decorator
      (@login_required / @jwt_required / ...) guards it, so any caller can reach
      PHI. If auth is enforced elsewhere (e.g. a before_request hook), suppress
      with `# clearmap:allow access-flask-unauthenticated-phi-route`.
    metadata:
      clearmap_category: AUTH
      clearmap_severity: critical
      clearmap_title: Unguarded Flask PHI route (no auth decorator)
      hipaa_ref: 164.312(d)
      remediation: Guard PHI routes with an auth decorator or a global before_request auth hook.
    patterns:
      - pattern: |
          @$APP.route($PATH, ...)
          def $FN(...):
              ...
      - pattern-not: |
          @$APP.route($PATH, ...)
          @$AUTH
          def $FN(...):
              ...
      - pattern-not: |
          @$APP.route($PATH, ...)
          @$AUTH(...)
          def $FN(...):
              ...
      - metavariable-pattern:
          metavariable: $PATH
          patterns:
            - pattern-regex: (?i)(patient|record|chart|mrn|note|lab|medication|diagnos|encounter|observation|allerg|conversation|message|scribe|intake|survey|assessment|member|eligibility|prescription|vital|symptom|condition|appointment|referral|immuniz|imaging|claim|insurance|\bcase)

  - id: access-express-unauthenticated-phi-route
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      An Express PHI route is registered with a bare handler — no inline auth
      middleware. HIGH (not critical) because auth may be applied globally via
      app.use(...); verify that a global auth middleware covers this route, or
      suppress with `// clearmap:allow access-express-unauthenticated-phi-route`.
    metadata:
      clearmap_category: AUTH
      clearmap_severity: high
      clearmap_title: Express PHI route without inline auth middleware
      hipaa_ref: 164.312(d)
      remediation: Apply auth middleware (inline or app.use) ahead of every PHI route handler.
    patterns:
      - pattern-either:
          - pattern: $APP.$METHOD($PATH, ($REQ, $RES) => { ... })
          - pattern: $APP.$METHOD($PATH, ($REQ, $RES, $NEXT) => { ... })
          - pattern: $APP.$METHOD($PATH, async ($REQ, $RES) => { ... })
          - pattern: $APP.$METHOD($PATH, function $F($REQ, $RES) { ... })
      - metavariable-regex:
          metavariable: $METHOD
          regex: ^(get|post|put|patch|delete)$
      - metavariable-pattern:
          metavariable: $PATH
          patterns:
            - pattern-regex: (?i)(patient|record|chart|mrn|note|lab|medication|diagnos|encounter|observation|allerg|conversation|message|scribe|intake|survey|assessment|member|eligibility|prescription|vital|symptom|condition|appointment|referral|immuniz|imaging|claim|insurance|\bcase)

  - id: access-auth-disabled-flag
    languages: [python, javascript, typescript]
    severity: ERROR
    message: >-
      An authentication kill-switch is hardcoded ON. Even when intended for local
      development, a committed auth-off flag is one deploy away from exposing PHI.
    metadata:
      clearmap_category: AUTH
      clearmap_severity: high
      clearmap_title: Authentication disabled by hardcoded flag
      hipaa_ref: 164.312(d)
      remediation: Remove the flag or gate it on a non-production environment check sourced at runtime.
    patterns:
      - pattern-regex: >-
          (?i)\b(auth\w*[_-]?(disabled|skip|bypass|off)|(disable|skip|bypass)[_-]?auth\w*)\s*[:=]\s*(True|true|1\b|"true"|'true')
      - pattern-not-regex: (?i)os\.environ|process\.env|getenv\(

  - id: access-jwt-no-expiry-py
    languages: [python]
    severity: WARNING
    message: >-
      A JWT is signed from a payload with no "exp" claim, so a leaked token is
      valid forever and logout cannot revoke it. 164.312(a)(2)(iii) requires
      automatic session termination.
    metadata:
      clearmap_category: ACCESS
      clearmap_severity: medium
      clearmap_title: JWT issued without expiry (no automatic logoff)
      hipaa_ref: 164.312(a)(2)(iii)
      remediation: Add a short exp (+iat) claim and server-side revocation; invalidate on logout.
    patterns:
      - pattern-either:
          - pattern: |
              $P = { ... }
              ...
              jwt.encode($P, ...)
          - pattern: 'jwt.encode({ ... }, ...)'
      - pattern-not-inside: |
          $P = { ..., "exp": $E, ... }
          ...
      - pattern-not: 'jwt.encode({ ..., "exp": $E, ... }, ...)'

  - id: access-jwt-no-expiry-js
    languages: [javascript, typescript]
    severity: WARNING
    message: >-
      jwt.sign() is called without an options object (no expiresIn), so the token
      never expires and logout cannot revoke it.
    metadata:
      clearmap_category: ACCESS
      clearmap_severity: medium
      clearmap_title: JWT issued without expiry (no automatic logoff)
      hipaa_ref: 164.312(a)(2)(iii)
      remediation: Pass { expiresIn } (and rotate signing keys); add server-side revocation.
    patterns:
      - pattern: $JWT.sign($PAYLOAD, $SECRET)
      - metavariable-regex:
          metavariable: $JWT
          regex: ^(jwt|jsonwebtoken)$

  - id: access-graphql-strawberry-idor
    languages: [python]
    severity: WARNING
    message: >-
      A Strawberry GraphQL resolver takes an object id but never reads
      info.context (the authenticated request) and never calls an ownership or
      authorization helper, so any caller may be able to read or mutate another
      patient's record by id (object-level authorization / IDOR). HIGH, not
      critical: authorization may live in a middleware or a permission class.
      Verify this resolver checks the caller and confirms they own the requested
      object, or suppress with `# clearmap:allow access-graphql-strawberry-idor`.
    metadata:
      clearmap_category: ACCESS
      clearmap_severity: high
      clearmap_title: GraphQL resolver without object-level authorization
      hipaa_ref: 164.312(a)(1)
      remediation: Read the authenticated principal from info.context and verify ownership of the requested object before returning it.
    patterns:
      - pattern-either:
          - pattern: |
              @strawberry.field
              def $FN(...):
                  ...
          - pattern: |
              @strawberry.field
              async def $FN(...):
                  ...
          - pattern: |
              @strawberry.field(...)
              def $FN(...):
                  ...
          - pattern: |
              @strawberry.field(...)
              async def $FN(...):
                  ...
          - pattern: |
              @strawberry.mutation
              def $FN(...):
                  ...
          - pattern: |
              @strawberry.mutation
              async def $FN(...):
                  ...
          - pattern: |
              @strawberry.mutation(...)
              def $FN(...):
                  ...
          - pattern: |
              @strawberry_django.field
              def $FN(...):
                  ...
          - pattern: |
              @strawberry_django.mutation
              def $FN(...):
                  ...
      # The resolver addresses an object by an id-like parameter.
      - pattern-either:
          - pattern: |
              def $FN(..., $ID: $T, ...):
                  ...
          - pattern: |
              async def $FN(..., $ID: $T, ...):
                  ...
      - metavariable-regex:
          metavariable: $ID
          regex: (?i).*(id|uid|uuid|mrn)$
      # Suppress when the resolver CAN authorize: it takes strawberry.Info, reads
      # a .context, or calls an ownership/authorization helper.
      - pattern-not: |
          def $FN(..., $INFO: strawberry.Info, ...):
              ...
      - pattern-not: |
          async def $FN(..., $INFO: strawberry.Info, ...):
              ...
      - pattern-not: |
          def $FN(...):
              ...
              $C.context
              ...
      - pattern-not: |
          async def $FN(...):
              ...
              $C.context
              ...
      - pattern-not:
          patterns:
            - pattern-either:
                - pattern: |
                    def $FN(...):
                        ...
                        $HELPER(...)
                        ...
                - pattern: |
                    async def $FN(...):
                        ...
                        $HELPER(...)
                        ...
            - metavariable-regex:
                metavariable: $HELPER
                regex: (?i).*(authoriz|authenticat|require|verify|ownership|owns|can_edit|can_access|check_access|ensure_|assert_|guard|permission|current_user|get_current)
